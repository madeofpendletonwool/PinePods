# Default values for pinepods.
# This is a YAML-formatted file.

## Number of pinepods pods to run
replicaCount: 1

## Container image configuration
image:
  # -- Repository to pull the container image from
  repository: madeofpendletonwool/pinepods
  # -- Tag of the image to pull
  # Default uses 'latest' but it's recommended to use a specific version
  tag: latest
  # -- Image pull policy
  # Defaults to IfNotPresent but consider using Always if using latest tag - You know, if you like living on the edge. You could even use nightly.
  pullPolicy: IfNotPresent

## Service configuration for exposing the pinepods application
service:
  # -- Kubernetes service type
  # Valid values are ClusterIP, NodePort, LoadBalancer
  type: ClusterIP
  # -- Port the service will listen on
  port: 8040
  # -- Optional nodePort to use when service type is NodePort
  # If not set, Kubernetes will automatically allocate one
  # nodePort: 30007

## Ingress configuration for exposing the application to external traffic
ingress:
  # -- Enable ingress resource
  enabled: true
  # -- Ingress class name
  className: ""
  # -- Additional ingress annotations
  annotations: {
    traefik.ingress.kubernetes.io/router.entrypoints: web
  }
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  # -- Ingress hosts configuration
  hosts:
    - host: pinepods.mydomain.com
      paths:
        - path: /
          pathType: Prefix
  # -- TLS configuration for ingress
  tls: []
  # - secretName: chart-example-tls
  #   hosts:
  #     - chart-example.local

## Persistence configuration
persistence:
  # -- Enable persistent storage
  enabled: true
  downloads:
    # -- Storage class for downloads PVC
    # If empty, default StorageClass will be used
    storageClass: ""
    # -- Access mode for downloads PVC
    accessMode: ReadWriteOnce
    # -- Size of downloads PVC
    size: 5Gi
    # -- Use existing PVC for downloads
    # If set, a new PVC will not be created
    existingClaim: ""
  backups:
    # -- Storage class for backups PVC
    storageClass: ""
    # -- Access mode for backups PVC
    accessMode: ReadWriteOnce
    # -- Size of backups PVC
    size: 2Gi
    # -- Use existing PVC for backups
    existingClaim: ""

## PostgreSQL configuration
postgresql:
  # -- Enable PostgreSQL deployment
  # Set to false if using external database
  enabled: true
  image:
    repository: bitnamilegacy/postgresql
  auth:
    # -- PostgreSQL username
    username: postgres
    # -- PostgreSQL password
    # Consider using a secret for production environments
    password: "supersecretpassword"
    # -- PostgreSQL database name
    database: pinepods_database
  # -- PostgreSQL resource configuration
  # Default values provide good performance for most deployments
  # Increase for larger deployments or high concurrent usage
  resources:
    requests:
      # -- Memory request for PostgreSQL container
      memory: 512Mi
      # -- CPU request for PostgreSQL container
      cpu: 250m
    limits:
      # -- Memory limit for PostgreSQL container
      memory: 2Gi
      # -- CPU limit for PostgreSQL container
      cpu: 1000m
  # Run on control planes if needed
  # tolerations:
  #   - key: "node-role.kubernetes.io/control-plane"
  #     operator: "Exists"
  #     effect: "NoSchedule"
  persistence:
    # -- Enable PostgreSQL persistence
    enabled: true
    # -- Storage class for PostgreSQL PVC
    storageClass: ""
    # -- Size of PostgreSQL PVC
    size: 3Gi
    # -- Use existing PVC for PostgreSQL
    existingClaim: ""

# External database configuration
# Only used when postgresql.enabled is false
externalDatabase:
  type: postgresql
  host: ""
  port: 5432
  user: postgres
  password: ""
  database: pinepods_database
  existingSecret:
    enabled: false
    name: existing-secret
    key: password
  # -- manually provide the DB environment variables under extraEnv. Useful for DB solutions like CNPG
  manuallyProvide: false

resources: {}

## Valkey configuration
valkey:
  # -- Enable Valkey deployment
  enabled: true
  image:
    repository: bitnamilegacy/valkey
  architecture: standalone  # This prevents replica creation
  auth:
    enabled: false
  replica:
    replicaCount: 0  # Ensure no replicas are created
  primary:
    persistence:
      enabled: false 
  # Service configuration
  service:
    # -- Valkey port
    port: 6379

## Application environment variables
env:
  # -- Search API URL for podcast search functionality - Change these only if you're hosting the backend and the podcast people database yourself
  SEARCH_API_URL: "https://search.pinepods.online/api/search"
  PEOPLE_API_URL: "https://people.pinepods.online/api/hosts"
  # User Configuration
  # -- Default admin username
  USERNAME: "admin"
  # -- Default admin password
  PASSWORD: "password"
  # -- Admin full name
  FULLNAME: "Admin User"
  # -- Admin email address
  EMAIL: "admin@example.com"
  
  # Valkey Configuration
  # -- Valkey host
  # This is automatically set in deployment template - do not change
  # VALKEY_HOST: "post-valkey"
  # -- Valkey port
  # This is automatically set in deployment template - do not change
  # VALKEY_PORT: "6379"
  
  # Application Configuration
  # -- Debug mode
  # Set to true for additional logging
  DEBUG_MODE: "false"

## Allows you to specify additional environment values directly on the application pod. Useful for specific configmap or secret references.
extraEnv: []
# - name: CUSTOM_VARIABLE
#   value: "true"
# - name: DB_HOST
#   valueFrom:
#     secretKeyRef:
#       name: pinepods-db-app
#       key: host

## Pod Security Context
securityContext: {}
  # fsGroup: 2000
  # runAsUser: 1000
  # runAsNonRoot: true

## Container Security Context
containerSecurityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

## Node selector for pod assignment
nodeSelector: {}

## Pod tolerations
tolerations: []

## Pod affinity
affinity: {}


## Optional Backend configuration
## backend is the itunes and podcast index search API. This is publically maintained at https://search.pinepods.online. If you want to maintain it yourself you can though
backend:
  # -- Enable backend deployment
  enabled: true
  image:
    repository: madeofpendletonwool/pinepods_backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5000
  # -- Backend secrets
  secrets:
    apiKey: "MYPODCASTINDEXKEY"
    apiSecret: "MYPODCASTINDEXSECRET"
    youtubeApiKey: "YOUR_YOUTUBE_API_KEY_HERE"
  ingress:
    enabled: true
    className: ""
    annotations: {}
    hosts:
      - host: backend.mydomain.com
        paths:
          - path: /
            pathType: Prefix
    tls: []

## PodPeople DB configuration
## Podpeople is a publically available website in which you can get details on guests and hosts for podcasts that don't maintain podcast 2.0 in their feeds.
## If you do want to maintain it yourself you'll probably want to download a copy of the database here: https://podpeople.pinepods.online 
podpeople:
  # -- Enable PodPeople DB deployment
  enabled: true
  image:
    repository: madeofpendletonwool/podpeople_db
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8085
  persistence:
    enabled: true
    storageClass: ""
    size: 1Gi
    accessMode: ReadWriteOnce
    existingClaim: ""
  auth:
    adminUsername: "admin"
    adminPassword: "password"
  # -- PodPeople container environment. Referenced by the deployment template.
  environment:
    # -- ntfy server URL for new-host notifications (optional; leave empty to disable)
    ntfyUrl: ""
    # -- ntfy topic (optional)
    ntfyTopic: ""
    # -- Public base URL of the PodPeople instance
    baseurl: "https://podpeople.mydomain.com"
    # -- Search API URL. Only used when backend.enabled is false; if you aren't hosting
    #    the backend you probably want https://search.pinepods.online
    searchApiUrl: "https://search.pinepods.online"
  ingress:
    enabled: true
    className: ""
    annotations: {}
    hosts:
      - host: podpeople.mydomain.com
        paths:
          - path: /
            pathType: Prefix
    tls: []

## AI sidecar configuration (OPTIONAL — disabled by default)
## Provides AI features such as transcript generation (#726) via faster-whisper.
## When disabled, PinePods simply hides/disables the AI features — nothing else changes.
## When enabled, the app is pointed at this service via PINEPODS_AI_URL automatically.
##
## IMPORTANT: the AI container must be able to READ the same downloads volume the main app
## writes to. It mounts the downloads PVC read-only at the SAME path (/opt/pinepods/downloads),
## since the app passes absolute container paths. With the default ReadWriteOnce downloads PVC,
## the AI pod must be scheduled on the same node as the main pod (or set
## persistence.downloads.accessMode: ReadWriteMany with an RWX-capable storage class).
ai:
  # -- Enable the optional AI (transcription) sidecar
  enabled: false
  image:
    # -- Repository for the AI sidecar image
    repository: madeofpendletonwool/pinepods-ai
    # -- Tag of the AI sidecar image
    tag: latest
    # -- Image pull policy
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    # -- Port the AI sidecar listens on
    port: 8100
  # -- Whisper model + runtime settings (see the pinepods-ai README)
  whisper:
    model: "base"          # tiny|base|small|medium|large-v3
    device: "cpu"          # cuda if using a GPU-enabled image/node
    computeType: "int8"
  # -- Ad-detection LLM (#790) initial defaults. Models are best managed at runtime from
  #    Settings → AI in the web UI; these only seed the sidecar's defaults.
  llm:
    model: ""              # local GGUF filename under /models (bundled backend)
    url: ""                # OpenAI-compatible endpoint, e.g. http://ollama:11434/v1
    modelName: ""          # remote model id, e.g. qwen2.5:3b
    apiKey: ""             # remote API key (optional)
  # -- Persistent cache for downloaded Whisper model weights (optional but recommended)
  persistence:
    enabled: true
    storageClass: ""
    size: 5Gi
    accessMode: ReadWriteOnce
    existingClaim: ""
  # -- Resource requests/limits — transcription is CPU-heavy; tune for your hardware
  resources: {}
    # requests:
    #   memory: 2Gi
    #   cpu: "1"
    # limits:
    #   memory: 4Gi
    #   cpu: "2"
