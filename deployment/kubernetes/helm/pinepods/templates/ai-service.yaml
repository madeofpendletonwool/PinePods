{{- if .Values.ai.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pinepods.fullname" . }}-ai
  labels:
    {{- include "pinepods.labels" . | nindent 4 }}
    app.kubernetes.io/component: ai
spec:
  type: {{ .Values.ai.service.type }}
  ports:
    - port: {{ .Values.ai.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "pinepods.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ai
{{- end }}
