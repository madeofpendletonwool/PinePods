services:
  db:
    container_name: db
    image: mariadb:12
    command: --wait_timeout=1800
    environment:
      MYSQL_TCP_PORT: 3306
      MYSQL_ROOT_PASSWORD: myS3curepass
      MYSQL_DATABASE: pinepods_database
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_INIT_CONNECT: "SET @@GLOBAL.max_allowed_packet=64*1024*1024;"
    volumes:
      - /home/user/pinepods/sql:/var/lib/mysql
    restart: always

  valkey:
    image: valkey/valkey:8-alpine

  pinepods:
    image: madeofpendletonwool/pinepods:latest
    ports:
      - "8040:8040"
    environment:
      # Basic Server Info
      SEARCH_API_URL: "https://search.pinepods.online/api/search"
      PEOPLE_API_URL: "https://people.pinepods.online"
      HOSTNAME: "http://localhost:8040"
      # Database Vars
      DB_TYPE: mariadb
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: myS3curepass
      DB_NAME: pinepods_database
      # Valkey Settings
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      # Enable or Disable Debug Mode for additional Printing
      DEBUG_MODE: false
      PUID: ${UID:-911}
      PGID: ${GID:-911}
      # Add timezone configuration
      TZ: "America/New_York"
      # Optional AI features (#726 transcripts). Uncomment + run the pinepods-ai
      # service below to enable; leave unset to keep AI features disabled.
      # PINEPODS_AI_URL: "http://pinepods-ai:8100"

    volumes:
      # Mount the download and backup locations on the server
      - /home/user/pinepods/downloads:/opt/pinepods/downloads
      - /home/user/pinepods/backups:/opt/pinepods/backups
      # Mount local media files to use the Add Local Podcast feature (optional)
      - /home/user/pinepods/local-media:/opt/pinepods/local-media
      # Timezone volumes, HIGHLY optional. Read the timezone notes below
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    depends_on:
      - db
      - valkey

  # Optional AI sidecar for transcription (#726) + ad detection (#790). Disabled by
  # default — uncomment this whole service AND the PINEPODS_AI_URL var above to enable.
  # Model choices are managed at runtime from Settings → AI in the web UI; the env vars
  # below are only initial defaults. It only needs read-only access to the downloads dir.
  # pinepods-ai:
  #   image: madeofpendletonwool/pinepods-ai:latest
  #   environment:
  #     WHISPER_MODEL: "base"        # tiny|base|small|medium|large-v3
  #     WHISPER_DEVICE: "cpu"        # cuda if using a GPU image
  #     WHISPER_COMPUTE_TYPE: "int8"
  #     # Ad detection (#790): use a bundled local GGUF, or point AI_LLM_URL at an
  #     # OpenAI-compatible endpoint (Ollama/LM Studio/cloud). Best set from the UI.
  #     AI_LLM_MODEL: ""             # local GGUF filename under /models (optional default)
  #     # AI_LLM_URL: "http://ollama:11434/v1"
  #     # AI_LLM_API_KEY: ""
  #     # AI_LLM_MODEL_NAME: "qwen2.5:3b"
  #   volumes:
  #     - /home/user/pinepods/downloads:/opt/pinepods/downloads:ro
  #     - pinepods-ai-models:/models
  #   restart: always

# volumes:
