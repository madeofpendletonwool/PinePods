name: pinepods_mobile
description: Pinepods Podcast Server

version: 0.9.0+20252489

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.32.0"

dependencies:
  accessibility_tools: ^2.8.0
  app_links: ^7.0.0
  auto_size_text: ^3.0.0
  collection: ^1.18.0
  connectivity_plus: ^7.1.1
  crypto: ^3.0.7
  cupertino_icons: ^1.0.9
  flutter_carplay: ^1.6.3
  device_info_plus: ^13.2.0
  extended_image: ^10.0.1
  # 12.0.0-beta migrated file_picker's Windows implementation to win32 ^6.
  # Its Windows Dart code is compiled on Android/iOS too (the conditional export
  # keys on dart.library.ffi, not the OS), so the 10.x line — which is pinned to
  # win32 ^5 — fails to compile against the win32 ^6 that every other plugin
  # requires. Staying on the 12 beta keeps a single, consistent win32 ^6.
  file_picker: ^12.0.0-beta.7
  flutter_dialogs: ^3.0.0
  flutter_downloader: ^1.11.8
  flutter_secure_storage: ^10.0.0-beta.4
  flutter_launcher_icons: ^0.14.2
  flutter_spinkit: ^5.2.2
  flutter_widget_from_html_core: ^0.17.2
  fwfh_svg: ^0.16.1
  html: ^0.15.0
  http: ^1.6.0
  intl: ^0.20.2
  logging: ^1.0.2
  meta: ^1.16.0
  mp3_info: ^0.2.3
  package_info_plus: ^10.2.0
  path: ^1.8.3
  path_provider: ^2.1.4
  path_provider_platform_interface: ^2.0.4
  percent_indicator: ^4.2.5
  permission_handler: ^12.0.1
  podcast_search: ^0.7.15
  provider: ^6.1.5
  rxdart: ^0.28.0
  scrollable_positioned_list: ^0.3.7
  sembast: ^3.8.7
  share_plus: ^13.2.0
  shared_preferences: ^2.5.5
  sliver_tools: ^0.2.12
  url_launcher: ^6.3.1
  flutter_web_auth_2: ^5.0.0
  xml: ^6.6.0

  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  mockito: ^5.7.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter_icons:
  image_path_android: "assets/images/favicon.png"
  image_path_ios: "assets/images/icon-192.png"
  remove_alpha_ios: true
  android: true
  ios: true

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/favicon.png
    - assets/images/icon-192.png
    - assets/images/pinepods-logo.png
    - assets/images/1.webp
    - assets/images/2.webp
    - assets/images/3.webp
    - assets/images/4.webp
    - assets/images/5.webp
    - assets/images/6.webp
    - assets/images/7.webp
    - assets/images/8.webp
    - assets/images/9.webp

    # Certificate authorities
    - assets/ca/lets-encrypt-r3.pem
    - assets/ca/globalsign-gcc-r6-alphassl-ca-2023.pem

  fonts:
    - family: MontserratMedium
      fonts:
        - asset: assets/fonts/Montserrat-Medium.otf
    - family: MontserratRegular
      fonts:
        - asset: assets/fonts/Montserrat-Regular.otf
    - family: MontserratBold
      fonts:
        - asset: assets/fonts/Montserrat-Bold.otf
